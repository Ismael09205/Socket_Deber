<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mensajeria en Tiempo Real</title>
<style>
body{font-family:Arial;margin:0;background:#f1f5f9}
header{background:#0f172a;color:white;padding:20px}
.contenedor{display:grid;grid-template-columns:360px 1fr;gap:20px;padding:20px}
.panel{background:white;padding:18px;border-radius:12px;margin-bottom:20px}
input,select,button{width:100%;padding:10px;margin:6px 0;box-sizing:border-box}
button{background:#2563eb;color:white;border:0;border-radius:8px;cursor:pointer}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #cbd5e1;padding:8px;font-size:14px}
th{background:#e2e8f0}

.pestanas{display:flex;gap:10px;margin-bottom:10px}
.pestana-btn{background:#e2e8f0;color:#334155;padding:10px 20px;border:0;border-radius:8px 8px 0 0;cursor:pointer;width:auto}
.pestana-btn.activa{background:#2563eb;color:white}
.chat-box{height:460px;overflow-y:auto;background:white;border-radius:0 12px 12px 12px;padding:18px;border:1px solid #e2e8f0;display:none}
.chat-box.activa{display:block}

.msg{padding:10px;margin-bottom:10px;border-radius:8px;background:#e0f2fe}
/* Estilo limpio para simular chat real */
.mio{background:#dcfce7;border-left:5px solid #16a34a}
.sistema{background:#fef3c7;color:#92400e}
small{color:#64748b;float:right;font-size:11px}
</style>
</head>
<body>

<header>
  <h1>Mensajeria en Tiempo Real</h1>
  <p>Registro, mensajes globales y mensajes privados separados</p>
</header>

<div class="contenedor">
  <aside>
    <section class="panel">
      <h2>1. Registrar usuario</h2>
      <input id="nombreInput" placeholder="Escribe tu nombre">
      <button onclick="registrarUsuario()">Registrar</button>
    </section>

    <section class="panel">
      <h2>2. Usuarios conectados</h2>
      <p>Total: <span id="totalUsuarios">0</span></p>
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>IP</th>
            <th>ID</th>
          </tr>
        </thead>
        <tbody id="tablaUsuarios"></tbody>
      </table>
    </section>

    <section class="panel">
      <h2>3. Mensaje privado</h2>
      <select id="usuarioDestino">
        <option value="">Selecciona usuario</option>
      </select>
      <input id="mensajePrivadoInput" placeholder="Mensaje privado">
      <button onclick="enviarPrivado()">Enviar privado</button>
    </section>
  </aside>

  <main>
    <section class="panel">
      <h2>4. Mensaje global</h2>
      <input id="mensajeGlobalInput" placeholder="Mensaje para todos">
      <button onclick="enviarGlobal()">Enviar global</button>
    </section>

    <section>
      <div class="pestanas">
        <button class="pestana-btn activa" onclick="cambiarPestana('global')">Chat Global</button>
        <button class="pestana-btn" onclick="cambiarPestana('privado')">Chat Privado</button>
      </div>
      
      <div id="chatGlobal" class="chat-box activa"></div>
      <div id="chatPrivado" class="chat-box"></div>
    </section>
  </main>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const nombreInput = document.getElementById("nombreInput");
const tablaUsuarios = document.getElementById("tablaUsuarios");
const totalUsuarios = document.getElementById("totalUsuarios");
const usuarioDestino = document.getElementById("usuarioDestino");
const mensajeGlobalInput = document.getElementById("mensajeGlobalInput");
const mensajePrivadoInput = document.getElementById("mensajePrivadoInput");

const chatGlobal = document.getElementById("chatGlobal");
const chatPrivado = document.getElementById("chatPrivado");

function cambiarPestana(tipo) {
  const botones = document.querySelectorAll('.pestana-btn');
  botones.forEach(btn => btn.classList.remove('activa'));
  
  chatGlobal.classList.remove('activa');
  chatPrivado.classList.remove('activa');
  
  if(tipo === 'global') {
    botones[0].classList.add('activa');
    chatGlobal.classList.add('activa');
  } else {
    botones[1].classList.add('activa');
    chatPrivado.classList.add('activa');
  }
}

function registrarUsuario(){
  const nombre = nombreInput.value.trim();
  if(!nombre){
    alert("Escribe tu nombre");
    return;
  }
  socket.emit("registrar", nombre);
}

function enviarGlobal(){
  const texto = mensajeGlobalInput.value.trim();
  if(!texto){
    alert("Escribe un mensaje global");
    return;
  }
  socket.emit("mensaje-global", texto);
  mensajeGlobalInput.value = "";
}

function enviarPrivado(){
  const destinoId = usuarioDestino.value;
  const texto = mensajePrivadoInput.value.trim();

  if(!destinoId){
    alert("Selecciona un usuario destino");
    return;
  }

  if(!texto){
    alert("Escribe un mensaje privado");
    return;
  }

  socket.emit("mensaje-privado", { destinoId, texto });
  
  /* Formato limpio para tus propios mensajes */
  const horaActual = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
  agregarMensaje(chatPrivado, "mio", `<strong>Yo</strong><small>${horaActual}</small><br>${texto}`);
  
  mensajePrivadoInput.value = "";
}

function agregarMensaje(elementoChat, clase, contenido){
  const div = document.createElement("div");
  div.className = "msg " + clase;
  div.innerHTML = contenido;
  elementoChat.appendChild(div);
  elementoChat.scrollTop = elementoChat.scrollHeight;
}

socket.on("usuarios-conectados", (usuarios) => {
  tablaUsuarios.innerHTML = "";
  usuarioDestino.innerHTML = `<option value="">Selecciona usuario</option>`;
  totalUsuarios.textContent = usuarios.length;

  usuarios.forEach((u) => {
    const fila = document.createElement("tr");
    fila.innerHTML = `
      <td>${u.nombre}</td>
      <td>${u.ip}</td>
      <td>${u.id.substring(0, 6)}...</td>
    `;
    tablaUsuarios.appendChild(fila);

    const esSiquiereYo = u.id === socket.id ? " (Yo)" : "";
    if(u.nombre !== "Sin nombre"){
      const option = document.createElement("option");
      option.value = u.id;
      option.textContent = `${u.nombre} - ${u.ip}${esSiquiereYo}`;
      usuarioDestino.appendChild(option);
    }
  });
});

socket.on("mensaje-global", (data) => {
  const horaClean = data.hora ? data.hora.substring(0, 5) : "";
  agregarMensaje(chatGlobal, "", `<strong>${data.de}</strong><small>${horaClean}</small><br>${data.texto}`);
});

/* Muestra unicamente el nombre del emisor del mensaje privado */
socket.on("mensaje-privado", (data) => {
  const horaClean = data.hora ? data.hora.substring(0, 5) : "";
  agregarMensaje(chatPrivado, "", `<strong>${data.de}</strong><small>${horaClean}</small><br>${data.texto}`);
});

socket.on("mensaje-sistema", (data) => {
  const horaClean = data.hora ? data.hora.substring(0, 5) : "";
  agregarMensaje(chatGlobal, "sistema", `<strong>Sistema</strong><small>${horaClean}</small><br>${data.texto}`);
});
</script>
</body>
</html>
